<!--
  ═══════════════════════════════════════════════════════════════
  NGU PERMISSION CHECK — paste this <script> block into any
  protected page (documents.html, personaldetails.html, contract.html)

  Set PAGE_KEY to match the permission key for that page:
    documents.html      → "documents"
    personaldetails.html → "personaldetails"
    contract.html       → "contract"
  ═══════════════════════════════════════════════════════════════
-->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    // ▼ Change this to "documents", "personaldetails", or "contract"
    const PAGE_KEY = "documents";

    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Hide page content immediately while we check
    document.body.style.visibility = 'hidden';

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            // Not logged in → back to login
            window.location.href = 'index.html';
            return;
        }

        try {
            // Look up this user's Firestore record by their Auth UID
            const q    = query(collection(db, "NGUO Database"), where("authUid", "==", user.uid));
            const snap = await getDocs(q);

            if (snap.empty) {
                // No Firestore record — deny
                window.location.href = 'index.html';
                return;
            }

            const userData   = snap.docs[0].data();
            const permissions = userData.permissions || {};

            if (!permissions[PAGE_KEY]) {
                // Permission not granted → redirect to dashboard with a message
                window.location.href = 'index.html?denied=1';
                return;
            }

            // ✓ Access granted — show the page
            document.body.style.visibility = 'visible';

        } catch (err) {
            console.error('Permission check failed:', err);
            window.location.href = 'index.html';
        }
    });
</script>
