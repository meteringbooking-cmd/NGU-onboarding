<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NGU — Manage Users</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #005EB8;
            --primary-dark: #003d7a;
            --accent: #00A3E0;
            --bg-dark: #0A1628;
            --bg-card: #1a2942;
            --text-light: #E8EDF2;
            --text-muted: #8B9AAE;
            --border: #2a3f5f;
            --success: #10B981;
            --error: #EF4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1f3a 100%);
            color: var(--text-light);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(0,163,224,0.09) 0%, transparent 60%),
                radial-gradient(circle at 85% 75%, rgba(0,94,184,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .logo {
            max-height: 70px;
            display: block;
            margin: 0 auto 2.5rem;
        }
        h1 {
            font-size: 2.1rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            margin-bottom: 3rem;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }
        .card h2 {
            font-size: 1.45rem;
            margin-bottom: 1.8rem;
            color: var(--text-light);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.6rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 0.95rem 1.1rem;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0,163,224,0.15);
        }
        .btn {
            padding: 1rem 2.2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,163,224,0.35);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error-msg {
            color: var(--error);
            margin-top: 1rem;
            font-size: 0.95rem;
        }
        .success-msg {
            color: var(--success);
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            font-size: 0.95rem;
        }
        th, td {
            padding: 1rem 1.1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: rgba(0,163,224,0.08);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.4px;
        }
        tr:hover {
            background: rgba(0,163,224,0.06);
        }

        .warning-box {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 12px;
            padding: 1.2rem;
            margin: 1.5rem 0 2.5rem;
            color: #fecaca;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1"
         alt="NGU Logo" class="logo">

    <h1>User Database</h1>
    <p class="subtitle">Manage NGU Onboarding accounts</p>

    <div class="warning-box">
        ⚠️ <strong>This page is public</strong> — anyone with the link can see all users and create new accounts.
        Use only for testing or in a protected environment.
    </div>

    <div class="card">
        <h2>Create New User</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="displayName" placeholder="John Smith" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="newEmail" placeholder="john@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="text" id="newPassword" placeholder="Minimum 6 characters" required>
            </div>
        </div>

        <button class="btn btn-primary" id="createUserBtn" style="margin-top: 2rem;">
            Create User
        </button>

        <div id="createMsg" class="error-msg"></div>
    </div>

    <div class="card">
        <h2>Existing Users</h2>
        <div id="usersTable">
            <p style="text-align:center; color:var(--text-muted); padding:3rem 0;">
                Loading users...
            </p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
        getFirestore, collection, addDoc, getDocs, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    // ── REPLACE WITH YOUR OWN FIREBASE CONFIG ────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
        // measurementId: "..."   ← add if needed
    };

    const app = initializeApp(firebaseConfig);
    const db   = getFirestore(app);

    const colRef = collection(db, "NGUO Database");

    const createBtn = document.getElementById('createUserBtn');
    const msgEl     = document.getElementById('createMsg');
    const tableEl   = document.getElementById('usersTable');

    async function loadUsers() {
        try {
            const snap = await getDocs(colRef);
            let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Created</th></tr></thead><tbody>';

            if (snap.empty) {
                html = '<p style="text-align:center; padding:3rem 0; color:var(--text-muted);">No users found</p>';
            } else {
                snap.forEach(doc => {
                    const d = doc.data();
                    const date = d.createdAt
                        ? new Date(d.createdAt.toMillis()).toLocaleString([], {dateStyle:'medium', timeStyle:'short'})
                        : '—';
                    html += `<tr>
                        <td>${d.name || '—'}</td>
                        <td>${d.email || '—'}</td>
                        <td>${date}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
            }

            tableEl.innerHTML = html;
        } catch (err) {
            tableEl.innerHTML = `<p style="color:var(--error); text-align:center; padding:2rem;">
                Error loading users: ${err.message}
            </p>`;
        }
    }

    createBtn.addEventListener('click', async () => {
        const name  = document.getElementById('displayName').value.trim();
        const email = document.getElementById('newEmail').value.trim();
        const pass  = document.getElementById('newPassword').value;

        msgEl.className = 'error-msg';
        msgEl.textContent = '';

        if (!name || !email || !pass || pass.length < 6) {
            msgEl.textContent = 'Please fill all fields (password ≥ 6 characters)';
            return;
        }

        createBtn.disabled = true;
        createBtn.textContent = 'Creating...';

        try {
            await addDoc(colRef, {
                name,
                email,
                passwordPlain: pass,           // ← only for debugging – remove in production!
                createdAt: serverTimestamp()
            });

            msgEl.className = 'success-msg';
            msgEl.textContent = 'User record created ✓ (note: actual auth account must still be created in Firebase console)';
            loadUsers();

            // Clear form
            document.getElementById('displayName').value = '';
            document.getElementById('newEmail').value = '';
            document.getElementById('newPassword').value = '';
        } catch (err) {
            let txt = err.message;
            if (err.code === 'permission-denied') {
                txt = 'Permission denied – check Firestore security rules';
            }
            msgEl.textContent = txt;
        }

        createBtn.disabled = false;
        createBtn.textContent = 'Create User';
    });

    // Initial load
    loadUsers();
</script>
</body>
</html>
