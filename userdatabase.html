<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NGU — Manage Users</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #005EB8;
            --primary-dark: #003d7a;
            --accent: #00A3E0;
            --bg-dark: #0A1628;
            --bg-card: #1a2942;
            --text-light: #E8EDF2;
            --text-muted: #8B9AAE;
            --border: #2a3f5f;
            --success: #10B981;
            --error: #EF4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1f3a 100%);
            color: var(--text-light);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(0,163,224,0.09) 0%, transparent 60%),
                radial-gradient(circle at 85% 75%, rgba(0,94,184,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .logo {
            max-height: 70px;
            display: block;
            margin: 0 auto 2.5rem;
        }
        h1 {
            font-size: 2.1rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            margin-bottom: 3rem;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }
        .card h2 {
            font-size: 1.45rem;
            margin-bottom: 1.8rem;
            color: var(--text-light);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.6rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 0.95rem 1.1rem;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0,163,224,0.15);
        }
        .btn {
            padding: 1rem 2.2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,163,224,0.35);
        }
        .btn-secondary {
            background: var(--bg-dark);
            border: 2px solid var(--border);
            color: var(--text-light);
        }
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error-msg {
            color: var(--error);
            margin-top: 1rem;
            font-size: 0.95rem;
        }
        .success-msg {
            color: var(--success);
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            font-size: 0.95rem;
        }
        th, td {
            padding: 1rem 1.1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: rgba(0,163,224,0.08);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.4px;
        }
        tr:hover {
            background: rgba(0,163,224,0.06);
        }

        .warning-box {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 12px;
            padding: 1.2rem;
            margin: 1.5rem 0 2.5rem;
            color: #fecaca;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .info-box {
            background: rgba(0,163,224,0.1);
            border: 1px solid rgba(0,163,224,0.3);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 2rem;
            color: #bae6fd;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-success {
            background: rgba(16,185,129,0.2);
            color: #6ee7b7;
        }
        .badge-error {
            background: rgba(239,68,68,0.2);
            color: #fca5a5;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1"
         alt="NGU Logo" class="logo">

    <h1>User Database</h1>
    <p class="subtitle">Manage NGU Onboarding accounts</p>

    <div class="warning-box" style="background:rgba(0,163,224,0.1); border-color:rgba(0,163,224,0.3); color:#bae6fd; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
        🔒 <strong>Protected page</strong> — only signed-in users can access this.
        <button class="btn btn-secondary" id="signOutBtn" style="padding:0.5rem 1.2rem; font-size:0.9rem;">Sign Out</button>
    </div>

    <div class="card">
        <h2>Create New User</h2>

        <div class="info-box">
            ℹ️ This form creates a <strong>real Firebase Authentication account</strong> so the user can log in to <code>index.html</code>.
            It also saves their profile to Firestore.
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="displayName" placeholder="John Smith" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="newEmail" placeholder="john@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="text" id="newPassword" placeholder="Minimum 6 characters" required>
            </div>
        </div>

        <div style="display:flex; gap:1rem; align-items:center; margin-top:2rem; flex-wrap:wrap;">
            <button class="btn btn-primary" id="createUserBtn">Create User</button>
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">← Back to Login</button>
        </div>

        <div id="createMsg"></div>
    </div>

    <div class="card">
        <div class="header-actions">
            <h2 style="margin-bottom:0;">Existing Users</h2>
            <button class="btn btn-secondary" style="padding:0.6rem 1.2rem; font-size:0.9rem;" id="refreshBtn">↻ Refresh</button>
        </div>
        <div id="usersTable">
            <p style="text-align:center; color:var(--text-muted); padding:3rem 0;">
                Loading users...
            </p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        updateProfile,
        onAuthStateChanged,
        signOut
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import {
        getFirestore, collection, addDoc, getDocs, serverTimestamp, query, orderBy
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── Auth gate: redirect to login if not signed in ─────────────────────────
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = 'index.html';
        }
    });

    const colRef    = collection(db, "NGUO Database");
    const createBtn = document.getElementById('createUserBtn');
    const msgEl     = document.getElementById('createMsg');
    const tableEl   = document.getElementById('usersTable');

    // ── Load users from Firestore ─────────────────────────────────────────────
    async function loadUsers() {
        tableEl.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding:3rem 0;">Loading users...</p>';
        try {
            const snap = await getDocs(colRef);

            if (snap.empty) {
                tableEl.innerHTML = '<p style="text-align:center; padding:3rem 0; color:var(--text-muted);">No users found</p>';
                return;
            }

            let rows = '';
            snap.forEach(doc => {
                const d = doc.data();
                const date = d.createdAt
                    ? new Date(d.createdAt.toMillis()).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })
                    : '—';
                const authBadge = d.authUid
                    ? `<span class="badge badge-success">✓ Auth</span>`
                    : `<span class="badge badge-error">No Auth</span>`;
                rows += `<tr>
                    <td>${d.name || '—'}</td>
                    <td>${d.email || '—'}</td>
                    <td>${authBadge}</td>
                    <td>${date}</td>
                </tr>`;
            });

            tableEl.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Auth Status</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>`;
        } catch (err) {
            tableEl.innerHTML = `<p style="color:var(--error); text-align:center; padding:2rem;">
                Error loading users: ${err.message}
            </p>`;
        }
    }

    // ── Create user ───────────────────────────────────────────────────────────
    createBtn.addEventListener('click', async () => {
        const name  = document.getElementById('displayName').value.trim();
        const email = document.getElementById('newEmail').value.trim();
        const pass  = document.getElementById('newPassword').value;

        msgEl.className = 'error-msg';
        msgEl.textContent = '';

        if (!name || !email || !pass) {
            msgEl.className = 'error-msg';
            msgEl.textContent = 'Please fill in all fields.';
            return;
        }
        if (pass.length < 6) {
            msgEl.className = 'error-msg';
            msgEl.textContent = 'Password must be at least 6 characters.';
            return;
        }

        createBtn.disabled = true;
        createBtn.textContent = 'Creating...';

        try {
            let userCred;
            let wasLinked = false;

            try {
                // Attempt 1: Create a brand new Auth account
                userCred = await createUserWithEmailAndPassword(auth, email, pass);
            } catch (createErr) {
                if (createErr.code === 'auth/email-already-in-use') {
                    // Attempt 2: Auth account exists — sign in to retrieve the UID
                    msgEl.className = 'success-msg';
                    msgEl.textContent = '⟳ Auth account already exists — linking to Firestore profile...';
                    try {
                        userCred = await signInWithEmailAndPassword(auth, email, pass);
                        wasLinked = true;
                    } catch (signInErr) {
                        // Password is wrong for the existing account
                        if (signInErr.code?.includes('wrong-password') || signInErr.code?.includes('invalid-credential')) {
                            msgEl.className = 'error-msg';
                            msgEl.textContent = '⚠️ An Auth account exists for this email but the password is incorrect. Use the correct password to link it, or reset it in the Firebase console.';
                        } else {
                            msgEl.className = 'error-msg';
                            msgEl.textContent = signInErr.message;
                        }
                        createBtn.disabled = false;
                        createBtn.textContent = 'Create User';
                        return;
                    }
                } else {
                    throw createErr; // Rethrow any other error
                }
            }

            // Update display name on auth profile
            await updateProfile(userCred.user, { displayName: name });

            // Check if a Firestore record already exists for this UID
            const existingSnap = await getDocs(colRef);
            const alreadyInFirestore = existingSnap.docs.some(d => d.data().authUid === userCred.user.uid);

            if (!alreadyInFirestore) {
                await addDoc(colRef, {
                    name,
                    email,
                    authUid: userCred.user.uid,
                    createdAt: serverTimestamp()
                });
            }

            msgEl.className = 'success-msg';
            if (wasLinked && alreadyInFirestore) {
                msgEl.textContent = `✓ "${name}" already fully set up — Auth account and Firestore record both exist.`;
            } else if (wasLinked) {
                msgEl.textContent = `✓ Linked! Existing Auth account for "${email}" is now connected to a Firestore profile.`;
            } else {
                msgEl.textContent = `✓ User "${name}" created successfully — they can now log in to index.html.`;
            }

            // Clear form
            document.getElementById('displayName').value = '';
            document.getElementById('newEmail').value    = '';
            document.getElementById('newPassword').value = '';

            loadUsers();

        } catch (err) {
            let txt = err.message;
            if (err.code === 'auth/invalid-email') {
                txt = 'Invalid email address.';
            } else if (err.code === 'auth/weak-password') {
                txt = 'Password is too weak (min. 6 characters).';
            } else if (err.code === 'permission-denied') {
                txt = 'Firestore permission denied – check security rules.';
            }
            msgEl.className = 'error-msg';
            msgEl.textContent = txt;
        }

        createBtn.disabled = false;
        createBtn.textContent = 'Create User';
    });

    document.getElementById('refreshBtn').addEventListener('click', loadUsers);
    document.getElementById('signOutBtn').addEventListener('click', async () => {
        await signOut(auth);
        window.location.href = 'index.html';
    });

    // Initial load
    loadUsers();
</script>
</body>
</html>
