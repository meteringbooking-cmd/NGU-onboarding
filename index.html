<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NGU Onboarding</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #005EB8;
            --primary-dark: #003d7a;
            --accent: #00A3E0;
            --bg-dark: #0A1628;
            --bg-card: #1a2942;
            --text-light: #E8EDF2;
            --text-muted: #8B9AAE;
            --border: #2a3f5f;
            --success: #10B981;
            --error: #EF4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1f3a 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(0,163,224,0.09) 0%, transparent 60%),
                radial-gradient(circle at 85% 75%, rgba(0,94,184,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .logo {
            max-height: 90px;
            width: auto;
            display: block;
            margin: 0 auto;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 2.1rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.6rem;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            font-size: 0.95rem;
            margin-bottom: 2.2rem;
        }
        .form-group {
            margin-bottom: 1.6rem;
        }
        label {
            display: block;
            margin-bottom: 0.55rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-light);
        }
        input {
            width: 100%;
            padding: 0.95rem 1.1rem;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0,163,224,0.15);
        }
        .btn {
            width: 100%;
            padding: 1.05rem;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,163,224,0.35);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error-msg {
            color: var(--error);
            font-size: 0.9rem;
            margin-top: 0.8rem;
            text-align: center;
            min-height: 1.3rem;
        }
        .success-msg {
            color: var(--success);
            font-size: 0.9rem;
            margin-top: 0.8rem;
            text-align: center;
        }
        .hidden { display: none !important; }
        #dashboard {
            text-align: center;
            padding: 5rem 1.5rem;
            max-width: 700px;
        }
        #signOutBtn, #manageUsersBtn {
            margin: 1.2rem 0.8rem;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            color: var(--text-light);
            padding: 1rem 2.5rem;
        }
        #signOutBtn:hover, #manageUsersBtn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        @media (max-width: 480px) {
            .logo { max-height: 70px; }
            h1 { font-size: 1.8rem; }
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1"
             alt="NGU Logo" class="logo">
    </div>

    <div class="card" id="loginCard">
        <h1>NGU Onboarding</h1>
        <p class="subtitle">Sign in to continue</p>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="name@company.com" autocomplete="email" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button class="btn btn-primary" id="signInBtn">Sign In</button>

        <div class="error-msg" id="errorMsg"></div>
    </div>

    <div id="dashboard" class="hidden">
        <h1>Welcome to NGU Onboarding</h1>
        <p style="color:var(--text-muted); margin:2.5rem 0; font-size:1.1rem;">
            Onboarding dashboard (content to be added)
        </p>
        <div>
            <button class="btn" id="manageUsersBtn">Manage Users</button>
            <button class="btn" id="signOutBtn">Sign Out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import {
            getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
        } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

        // ── REPLACE WITH YOUR OWN CONFIG ──
        const firebaseConfig = {
            apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
            authDomain: "oesperformance-a54c0.firebaseapp.com",
            projectId: "oesperformance-a54c0",
            storageBucket: "oesperformance-a54c0.firebasestorage.app",
            messagingSenderId: "484894102454",
            appId: "1:484894102454:web:17535ee497eac2d90d6717"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginCard   = document.getElementById('loginCard');
        const dashboard   = document.getElementById('dashboard');
        const errorMsg    = document.getElementById('errorMsg');
        const signInBtn   = document.getElementById('signInBtn');
        const signOutBtn  = document.getElementById('signOutBtn');
        const manageBtn   = document.getElementById('manageUsersBtn');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginCard.classList.add('hidden');
                dashboard.classList.remove('hidden');
                errorMsg.textContent = '';
            } else {
                loginCard.classList.remove('hidden');
                dashboard.classList.add('hidden');
            }
        });

        signInBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const pass  = document.getElementById('password').value;

            if (!email || !pass) {
                errorMsg.textContent = 'Please enter email and password';
                return;
            }

            signInBtn.disabled = true;
            signInBtn.textContent = 'Signing in...';
            errorMsg.textContent = '';

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                let msg = 'Login failed – check credentials';
                if (err.code?.includes('invalid-credential') || err.code?.includes('wrong-password')) {
                    msg = 'Invalid email or password';
                } else if (err.code?.includes('user-not-found')) {
                    msg = 'No account with this email';
                } else if (err.code?.includes('too-many-requests')) {
                    msg = 'Too many attempts – wait a moment';
                } else {
                    msg = err.message || msg;
                }
                errorMsg.textContent = msg;
            }

            signInBtn.disabled = false;
            signInBtn.textContent = 'Sign In';
        });

        signOutBtn.addEventListener('click', async () => {
            await signOut(auth);
        });

        manageBtn.addEventListener('click', () => {
            window.location.href = 'userdatabase.html';
        });
    </script>
</body>
</html>
