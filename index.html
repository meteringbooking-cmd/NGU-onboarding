<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NGU Onboarding</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #005EB8;
            --primary-dark: #003d7a;
            --accent: #00A3E0;
            --bg-dark: #0A1628;
            --bg-card: #1a2942;
            --text-light: #E8EDF2;
            --text-muted: #8B9AAE;
            --border: #2a3f5f;
            --success: #10B981;
            --error: #EF4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1f3a 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(0,163,224,0.09) 0%, transparent 60%),
                radial-gradient(circle at 85% 75%, rgba(0,94,184,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
        .logo-container { text-align: center; margin-bottom: 2.5rem; }
        .logo { max-height: 90px; width: auto; display: block; margin: 0 auto; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 2.1rem; font-weight: 700; text-align: center; margin-bottom: 0.6rem;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center; color: var(--text-muted);
            font-family: 'DM Mono', monospace; font-size: 0.95rem; margin-bottom: 2.2rem;
        }
        .form-group { margin-bottom: 1.6rem; }
        label { display: block; margin-bottom: 0.55rem; font-weight: 600; font-size: 0.95rem; color: var(--text-light); }
        input {
            width: 100%; padding: 0.95rem 1.1rem; background: var(--bg-dark);
            border: 2px solid var(--border); border-radius: 10px; color: white;
            font-size: 1rem; font-family: inherit; transition: all 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,163,224,0.15); }
        .btn {
            padding: 1.05rem; border: none; border-radius: 12px;
            font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: all 0.25s; font-family: inherit;
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,163,224,0.35); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg { color: var(--error); font-size: 0.9rem; margin-top: 0.8rem; text-align: center; min-height: 1.3rem; }
        .hidden { display: none !important; }

        #dashboard {
            text-align: center;
            padding: 3rem 1.5rem;
            width: 100%;
            max-width: 700px;
        }
        #dashboard h1 { margin-bottom: 0.5rem; }
        #dashboard .subtitle { margin-bottom: 2.5rem; }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .dash-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-light);
            border-radius: 14px;
            padding: 1.2rem 1rem;
            font-size: 0.97rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.22s;
            font-family: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        .dash-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,163,224,0.2); }
        .dash-btn .btn-icon { font-size: 1.6rem; }
        .dash-btn .btn-label { font-size: 0.9rem; }

        .dash-btn.admin { border-color: rgba(0,94,184,0.4); }
        .dash-btn.admin:hover { border-color: #60a5fa; color: #60a5fa; }

        .dash-btn.locked {
            opacity: 0.32;
            cursor: not-allowed;
            filter: grayscale(1);
            pointer-events: none;
        }
        .dash-btn.locked .lock-icon { display: inline; }
        .lock-icon { display: none; font-size: 0.8rem; margin-left: 4px; }

        .dash-btn.signout {
            background: transparent;
            border-color: rgba(239,68,68,0.3);
            color: #fca5a5;
            grid-column: 1 / -1;
            padding: 0.8rem;
            font-size: 0.9rem;
        }
        .dash-btn.signout:hover { border-color: var(--error); color: var(--error); transform: none; box-shadow: none; }

        /* Driver Questionnaire button — slightly highlighted */
        .dash-btn.dq {
            border-color: rgba(0,163,224,0.35);
            background: linear-gradient(135deg, rgba(0,94,184,0.12) 0%, rgba(0,163,224,0.08) 100%);
        }
        .dash-btn.dq:hover { border-color: var(--accent); color: var(--accent); }

        .section-label {
            text-align: left;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 1.8rem 0 0.75rem;
        }

        @media (max-width: 480px) {
            .logo { max-height: 70px; }
            h1 { font-size: 1.8rem; }
            .card { padding: 2rem 1.5rem; }
            .btn-group { grid-template-columns: 1fr; }
            .dash-btn.signout { grid-column: 1; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1"
             alt="NGU Logo" class="logo">
    </div>

    <!-- Login -->
    <div class="card" id="loginCard">
        <h1>NGU Onboarding</h1>
        <p class="subtitle">Sign in to continue</p>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="name@company.com" autocomplete="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button class="btn btn-primary" id="signInBtn">Sign In</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <h1>NGU Recruitment/Onboarding</h1>
        <p class="subtitle">Welcome back — what would you like to do?</p>

        <!-- Engineer section -->
        <p class="section-label">Engineer Management</p>
        <div class="btn-group">
            <button class="dash-btn" id="newApplicantBtn">
                <span class="btn-icon">📝</span>
                <span class="btn-label">New Applicants</span>
            </button>
            <button class="dash-btn" id="addEngineerBtn">
                <span class="btn-icon">👷</span>
                <span class="btn-label">Onboarding</span>
            </button>
            <button class="dash-btn" id="documentsBtn">
                <span class="btn-icon">📄</span>
                <span class="btn-label">Engineer Documents<span class="lock-icon">🔒</span></span>
            </button>
            <button class="dash-btn" id="personalDetailsBtn">
                <span class="btn-icon">👤</span>
                <span class="btn-label">Engineer Personal Details<span class="lock-icon">🔒</span></span>
            </button>
            <button class="dash-btn" id="contractBtn">
                <span class="btn-icon">📋</span>
                <span class="btn-label">View / Amend Contracts<span class="lock-icon">🔒</span></span>
            </button>
            <button class="dash-btn dq" id="driverQuestionnaireBtn">
                <span class="btn-icon">🚗</span>
                <span class="btn-label">Driver Questionnaire<span class="lock-icon">🔒</span></span>
            </button>
        </div>

        <!-- Admin section -->
        <p class="section-label">Administration</p>
        <div class="btn-group">
            <button class="dash-btn admin" id="manageUsersBtn">
                <span class="btn-icon">🔧</span>
                <span class="btn-label">Manage Admin Users<span class="lock-icon">🔒</span></span>
            </button>
            <button class="dash-btn signout" id="signOutBtn">Sign Out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import {
            getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
        } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import {
            getFirestore, collection, query, where, getDocs
        } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
            authDomain: "oesperformance-a54c0.firebaseapp.com",
            projectId: "oesperformance-a54c0",
            storageBucket: "oesperformance-a54c0.firebasestorage.app",
            messagingSenderId: "484894102454",
            appId: "1:484894102454:web:17535ee497eac2d90d6717"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        const loginCard  = document.getElementById('loginCard');
        const dashboard  = document.getElementById('dashboard');
        const errorMsg   = document.getElementById('errorMsg');
        const signInBtn  = document.getElementById('signInBtn');

        const GATED_BTNS = {
            documentsBtn:           'documents',
            personalDetailsBtn:     'personaldetails',
            contractBtn:            'contract',
            driverQuestionnaireBtn: 'driverquestionnaire',
            manageUsersBtn:         'manageusers'
        };

        const MASTER_EMAIL = 'admin@next-gen.uk';

        async function applyPermissions(user) {
            // Master admin — unlock everything
            if (user.email === MASTER_EMAIL) {
                Object.keys(GATED_BTNS).forEach(btnId => {
                    document.getElementById(btnId)?.classList.remove('locked');
                });
                return;
            }
            try {
                const q    = query(collection(db, "NGUO Database"), where("authUid", "==", user.uid));
                const snap = await getDocs(q);
                const perms = snap.empty ? {} : (snap.docs[0].data().permissions || {});

                Object.entries(GATED_BTNS).forEach(([btnId, permKey]) => {
                    const btn = document.getElementById(btnId);
                    if (!btn) return;
                    if (!perms[permKey]) {
                        btn.classList.add('locked');
                    } else {
                        btn.classList.remove('locked');
                    }
                });
            } catch (err) {
                console.warn('Could not load permissions:', err);
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginCard.classList.add('hidden');
                dashboard.classList.remove('hidden');
                errorMsg.textContent = '';
                await applyPermissions(user);
            } else {
                loginCard.classList.remove('hidden');
                dashboard.classList.add('hidden');
            }
        });

        signInBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const pass  = document.getElementById('password').value;

            if (!email || !pass) { errorMsg.textContent = 'Please enter email and password'; return; }

            signInBtn.disabled = true;
            signInBtn.textContent = 'Signing in...';
            errorMsg.textContent = '';

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                let msg = 'Login failed – check credentials';
                if (err.code?.includes('invalid-credential') || err.code?.includes('wrong-password')) msg = 'Invalid email or password';
                else if (err.code?.includes('user-not-found')) msg = 'No account with this email';
                else if (err.code?.includes('too-many-requests')) msg = 'Too many attempts – wait a moment';
                else msg = err.message || msg;
                errorMsg.textContent = msg;
            }

            signInBtn.disabled = false;
            signInBtn.textContent = 'Sign In';
        });

        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') signInBtn.click();
        });

        document.getElementById('signOutBtn').addEventListener('click',          () => signOut(auth));
        document.getElementById('newApplicantBtn').addEventListener('click',     () => window.location.href = 'newapplicant.html');
        document.getElementById('addEngineerBtn').addEventListener('click',      () => window.location.href = 'engineerdatabase.html');
        document.getElementById('documentsBtn').addEventListener('click',        () => window.location.href = 'documents.html');
        document.getElementById('personalDetailsBtn').addEventListener('click',  () => window.location.href = 'personaldetails.html');
        document.getElementById('contractBtn').addEventListener('click',         () => window.location.href = 'contract.html');
        document.getElementById('manageUsersBtn').addEventListener('click',      () => window.location.href = 'userdatabase.html');
        document.getElementById('driverQuestionnaireBtn').addEventListener('click', () => window.location.href = 'view-driver-questionnaire-submissions.html');
    </script>
</body>
</html>
