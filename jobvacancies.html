<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NGU — Job Vacancies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #005EB8;
            --accent: #00A3E0;
            --bg-dark: #0A1628;
            --bg-card: #1a2942;
            --bg-input: #0d1f3a;
            --text-light: #E8EDF2;
            --text-muted: #8B9AAE;
            --border: #2a3f5f;
            --success: #10B981;
            --error: #EF4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1f3a 100%);
            color: var(--text-light);
            min-height: 100vh;
            padding: 2rem 1.5rem 4rem;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(0,163,224,0.09) 0%, transparent 60%),
                radial-gradient(circle at 85% 75%, rgba(0,94,184,0.07) 0%, transparent 60%);
            pointer-events: none; z-index: -1;
        }
        .container { max-width: 760px; margin: 0 auto; }
        .logo { max-height: 70px; display: block; margin: 0 auto 2rem; }

        h1 {
            font-size: 2.1rem; font-weight: 700; text-align: center; margin-bottom: 0.4rem;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 0.85rem; margin-bottom: 2.5rem; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,163,224,0.08); border: 1px solid rgba(0,163,224,0.2);
            border-radius: 12px; padding: 1rem 1.4rem; margin-bottom: 2rem; flex-wrap: wrap; gap: 0.8rem;
        }
        .top-bar-info { font-size: 0.88rem; color: var(--text-muted); }
        .top-bar-info strong { color: var(--text-light); }

        .btn {
            padding: 0.65rem 1.4rem; border: none; border-radius: 10px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: all 0.22s; font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,163,224,0.3); }
        .btn-secondary { background: var(--bg-input); border: 2px solid var(--border); color: var(--text-light); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

        /* Job cards */
        .jobs-list { display: flex; flex-direction: column; gap: 0.9rem; }

        .job-card {
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 14px; padding: 1.2rem 1.4rem;
            display: flex; align-items: center; gap: 1.2rem;
            transition: all 0.22s; cursor: pointer;
        }
        .job-card:hover { border-color: rgba(0,163,224,0.4); }
        .job-card.live { border-color: var(--success); background: rgba(16,185,129,0.04); }
        .job-card.live:hover { border-color: #34d399; }

        /* Toggle switch */
        .toggle-wrap { flex-shrink: 0; }
        .toggle {
            position: relative; width: 52px; height: 28px;
            display: inline-block;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0; border-radius: 28px;
            background: rgba(255,255,255,0.1); border: 2px solid var(--border);
            transition: all 0.25s; cursor: pointer;
        }
        .toggle-slider::before {
            content: ''; position: absolute;
            width: 20px; height: 20px; border-radius: 50%;
            left: 2px; top: 50%; transform: translateY(-50%);
            background: var(--text-muted);
            transition: all 0.25s;
        }
        .toggle input:checked + .toggle-slider {
            background: rgba(16,185,129,0.25);
            border-color: var(--success);
        }
        .toggle input:checked + .toggle-slider::before {
            transform: translate(24px, -50%);
            background: var(--success);
        }

        .job-info { flex: 1; }
        .job-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; }
        .job-status {
            font-size: 0.75rem; font-family: 'DM Mono', monospace;
            font-weight: 600; letter-spacing: 0.5px;
        }
        .job-status.on  { color: var(--success); }
        .job-status.off { color: var(--text-muted); }

        .job-badge {
            font-size: 0.72rem; font-weight: 700; padding: 0.25rem 0.7rem;
            border-radius: 20px; flex-shrink: 0;
        }
        .job-badge.live  { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
        .job-badge.off   { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }

        .save-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,22,40,0.95); backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex; justify-content: center; align-items: center; gap: 1rem;
            transform: translateY(100%); transition: transform 0.3s ease;
            z-index: 100;
        }
        .save-bar.visible { transform: translateY(0); }
        .save-bar-text { font-size: 0.9rem; color: var(--text-muted); }
        #saveMsg { font-size: 0.88rem; }
        .ok  { color: var(--success); }
        .err { color: var(--error); }

        .loading-state { text-align: center; padding: 3rem; color: var(--text-muted); font-family: 'DM Mono', monospace; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <img src="https://www.dropbox.com/scl/fi/kkujm1u6y7vvnp7luq8d7/ngu-main-white.png?rlkey=kgq2uh48qh4xssh4vlbz868lr&raw=1" alt="NGU Logo" class="logo">

    <h1>Job Vacancies</h1>
    <p class="subtitle">Toggle positions on/off — live jobs appear on the application form</p>

    <div class="top-bar">
        <div class="top-bar-info">
            <strong id="liveCount">—</strong> positions currently live
        </div>
        <div style="display:flex; gap:0.7rem; flex-wrap:wrap;">
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">← Dashboard</button>
            <button class="btn btn-secondary" id="enableAllBtn">Enable All</button>
            <button class="btn btn-secondary" id="disableAllBtn">Disable All</button>
        </div>
    </div>

    <div class="jobs-list" id="jobsList">
        <div class="loading-state"><span class="spinner"></span>Loading vacancies…</div>
    </div>
</div>

<!-- Save bar -->
<div class="save-bar" id="saveBar">
    <span class="save-bar-text">Unsaved changes</span>
    <button class="btn btn-primary" id="saveBtn">Save Changes</button>
    <span id="saveMsg"></span>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
        getFirestore, doc, getDoc, setDoc
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import {
        getAuth, onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => { if (!user) window.location.href = 'index.html'; });

    const ALL_JOBS = [
        'Smart Meter Engineer',
        'Solar Installation Team',
        'Quality Assessor - Metering',
        'Quality Assessor - Solar',
        'Field Team Leader - Metering',
        'Metering Manager',
        'Solar Manager'
    ];

    const docRef = doc(db, 'NGUO Config', 'jobVacancies');
    let jobStates = {};  // title -> true/false
    let dirty = false;

    async function load() {
        try {
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                jobStates = snap.data().jobs || {};
            } else {
                // Default all on
                ALL_JOBS.forEach(j => jobStates[j] = true);
            }
        } catch (e) {
            ALL_JOBS.forEach(j => jobStates[j] = true);
        }
        render();
    }

    function render() {
        const list = document.getElementById('jobsList');
        list.innerHTML = '';

        ALL_JOBS.forEach(title => {
            const live = !!jobStates[title];
            const card = document.createElement('div');
            card.className = `job-card${live ? ' live' : ''}`;
            card.innerHTML = `
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" ${live ? 'checked' : ''} data-job="${title}">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="job-info">
                    <div class="job-title">${title}</div>
                    <div class="job-status ${live ? 'on' : 'off'}">${live ? '● LIVE' : '○ OFF'}</div>
                </div>
                <span class="job-badge ${live ? 'live' : 'off'}">${live ? 'Accepting' : 'Closed'}</span>
            `;

            const checkbox = card.querySelector('input[type="checkbox"]');
            checkbox.addEventListener('change', () => {
                jobStates[title] = checkbox.checked;
                markDirty();
                render();
            });

            list.appendChild(card);
        });

        updateLiveCount();
    }

    function updateLiveCount() {
        const count = ALL_JOBS.filter(j => !!jobStates[j]).length;
        document.getElementById('liveCount').textContent = count;
    }

    function markDirty() {
        dirty = true;
        document.getElementById('saveBar').classList.add('visible');
        document.getElementById('saveMsg').textContent = '';
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const btn = document.getElementById('saveBtn');
        const msg = document.getElementById('saveMsg');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Saving…';
        try {
            await setDoc(docRef, { jobs: jobStates });
            dirty = false;
            msg.className = 'ok';
            msg.textContent = '✓ Saved';
            document.getElementById('saveBar').classList.remove('visible');
        } catch (e) {
            msg.className = 'err';
            msg.textContent = 'Error: ' + e.message;
        }
        btn.disabled = false;
        btn.textContent = 'Save Changes';
    });

    document.getElementById('enableAllBtn').addEventListener('click', () => {
        ALL_JOBS.forEach(j => jobStates[j] = true);
        markDirty(); render();
    });
    document.getElementById('disableAllBtn').addEventListener('click', () => {
        ALL_JOBS.forEach(j => jobStates[j] = false);
        markDirty(); render();
    });

    load();
</script>
</body>
</html>
